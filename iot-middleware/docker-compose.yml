services:
  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    command: mosquitto -c /mosquitto-no-auth.conf
    networks:
      - iot-network

  dashboard:
    build:
      context: ./dashboard
    container_name: iot-dashboard
    ports:
      - "5100:5100"
    environment:
      DASHBOARD_PORT: "5100"
      JWT_SECRET_KEY: "iot-secret-dev-key-2024"
    networks:
      - iot-network

  middleware:
    build:
      context: ./middleware
    container_name: iot-middleware
    depends_on:
      - mqtt
      - dashboard
    environment:
      MQTT_HOST: "mqtt"
      MQTT_PORT: "1883"
      MQTT_TOPIC: "sensores/#"
      PARSER_FORMAT: "auto"

      DASHBOARD_URL: "http://dashboard:5100"
      DASHBOARD_USERNAME: "admin"
      DASHBOARD_PASSWORD: "admin123"
      DASHBOARD_MAX_RETRIES: "4"
      DASHBOARD_RETRY_DELAY: "2"
      DASHBOARD_TIMEOUT: "5"
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge